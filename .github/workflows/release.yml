name: Release Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output_name: localgo-cli-linux-amd64
          - goos: linux
            goarch: arm64
            output_name: localgo-cli-linux-arm64
          - goos: windows
            goarch: amd64
            output_name: localgo-cli-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output_name: localgo-cli-macos-amd64
          - goos: darwin
            goarch: arm64
            output_name: localgo-cli-macos-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.21"

    - name: Get Version Info
      id: vars
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date -u +'%Y-%m-%d_%H:%M:%S')" >> $GITHUB_ENV
        echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build Binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build -ldflags "-s -w -X main.Version=${{ env.VERSION }} -X main.GitCommit=${{ env.COMMIT }} -X main.BuildDate=${{ env.BUILD_DATE }}" -o release/${{ matrix.output_name }} ./cmd/localgo-cli

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}
        path: release/${{ matrix.output_name }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Flatten Artifacts
        run: |
          mkdir dist
          find artifacts -type f -exec cp '{}' dist/ \;
          ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
