name: Tests & Checks

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ["1.24"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true

    - name: Dependencies
      run: go mod download

    - name: Verify Code Generation
      if: runner.os == 'Linux'
      run: |
        go mod tidy
        git diff --exit-code

    - name: Run Tests
      run: go test -v -race ./...

    - name: Verify Build
      run: go build -v ./cmd/localgo-cli
