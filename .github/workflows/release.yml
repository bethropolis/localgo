name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write # Required to push images to GHCR

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Set up QEMU
        # Required for cross-compiling container architectures (amd64/arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write AUR SSH key
        env:
          AUR_SSH_KEY_CONTENT: ${{ secrets.AUR_SSH_KEY }}
        if: env.AUR_SSH_KEY_CONTENT != ''
        run: |
          mkdir -p "$HOME/.secrets"
          printf '%s' "$AUR_SSH_KEY_CONTENT" > "$HOME/.secrets/aur_key"
          chmod 600 "$HOME/.secrets/aur_key"
          echo "AUR_SSH_KEY=$HOME/.secrets/aur_key" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN:   ${{ secrets.TAP_GITHUB_TOKEN }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          AUR_SSH_KEY:        ${{ env.AUR_SSH_KEY }}