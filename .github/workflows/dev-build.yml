name: Dev Build & Artifacts

on:
  push:
    branches:
      - "dev"

permissions:
  contents: read

jobs:
  build:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tests
        run: go test -race ./...

      - name: Build Binaries
        run: make release

      - name: Zip Windows Binaries
        run: |
          zip -j dist/localgo-windows-amd64.zip dist/localgo-windows-amd64.exe
          zip -j dist/localgo-windows-arm64.zip dist/localgo-windows-arm64.exe
          rm -rf dist/localgo-windows-amd64.exe
          rm -rf dist/localgo-windows-arm64.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localgo-dev-builds
          path: dist/*
          if-no-files-found: error
          retention-days: 7
