name: Dev Build & Artifacts

on:
  push:
    branches:
      - "dev"

permissions:
  contents: read

jobs:
  build:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tests
        run: go test -race ./...

      - name: Build Binaries
        run: make release

      - name: Zip Windows Binaries
        run: |
          zip -r dist/localgo_Windows_x86_64.zip dist/localgo_Windows_x86_64
          zip -r dist/localgo_Windows_arm64.zip dist/localgo_Windows_arm64
          rm -rf dist/localgo_Windows_x86_64
          rm -rf dist/localgo_Windows_arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localgo-dev-builds
          path: dist/*
          if-no-files-found: error
          retention-days: 7
