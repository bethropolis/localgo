name: Dev Build & Artifacts

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build:
    name: Snapshot Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tests
        run: go test -race ./...

      - name: Snapshot Build
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          # --snapshot: build without a tag, no publish
          # --clean: remove previous dist/ before building
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localgo-dev-builds
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7